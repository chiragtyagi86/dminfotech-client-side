name: Deploy Dhanamitra Website

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build, Upload and Restart
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22

      # INSTALL FRONTEND DEPENDENCIES
      - name: Install Frontend Dependencies
        run: |
          cd client
          npm install

      # BUILD FRONTEND
      - name: Build Frontend
        run: |
          cd client
          npm run build

      # DEPLOY FRONTEND
      - name: Deploy Frontend to dmifotech.com
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./client/dist/
          server-dir: ./dmifotech.com/

      # DEPLOY BACKEND
      - name: Deploy Backend to api.dmifotech.com
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./server/
          server-dir: ./api.dmifotech.com/

      # RESTART NODE SERVER
      - name: Restart Node Backend with PM2
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          passphrase: ${{ secrets.SSH_PASSPHRASE }}
          port: ${{ secrets.SERVER_PORT }}
          timeout: 120s
          command_timeout: 30m
          script: |
            cd ~/api.dmifotech.com

            npm install --production

            pm2 restart dmifotech-api || pm2 start server.js --name dmifotech-api

            pm2 save

            pm2 status
