name: Dhanamitra CI/CD Pipeline

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  code-quality:
    name: 01 Code Quality
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Check Project Structure
        run: |
          test -d client
          test -d server
          test -f client/package.json
          test -f server/package.json

  frontend-build:
    name: 02 Frontend Build
    runs-on: ubuntu-latest
    needs: code-quality

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - name: Install Frontend
        run: |
          cd client
          npm ci

      - name: Build Frontend
        run: |
          cd client
          npm run build

  backend-check:
    name: 03 Backend Check
    runs-on: ubuntu-latest
    needs: frontend-build

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - name: Install Backend
        run: |
          cd server
          npm ci

      - name: TypeScript Build Check
        run: |
          cd server
          npm run build

  security-audit:
    name: 04 Security Audit
    runs-on: ubuntu-latest
    needs: backend-check

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Frontend Security Audit
        run: |
          cd client
          npm ci
          npm audit --audit-level=high

      - name: Backend Security Audit
        run: |
          cd server
          npm ci
          npm audit --audit-level=high

  deploy-staging:
    name: 05 Deploy Staging
    runs-on: ubuntu-latest
    needs: security-audit

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Frontend
        run: |
          cd client
          npm ci
          npm run build

      - name: Build Backend
        run: |
          cd server
          npm ci
          npm run build
          mkdir -p tmp
          date > tmp/restart.txt

      - name: Deploy Frontend to Staging
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./client/dist/
          server-dir: ./staging.dmifotech.com/
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/redketchup.zip

      - name: Deploy Backend to Staging
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./server/
          server-dir: ./staging-api.dmifotech.com/
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env

  deploy-production:
    name: 06 Deploy Production
    runs-on: ubuntu-latest
    needs: deploy-staging

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22

      - name: Build Frontend
        run: |
          cd client
          npm ci
          npm run build

      - name: Build Backend
        run: |
          cd server
          npm ci
          npm run build
          mkdir -p tmp
          date > tmp/restart.txt

      - name: Deploy Frontend to Production
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./client/dist/
          server-dir: ./dmifotech.com/
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/redketchup.zip

      - name: Deploy Backend to Production
        uses: SamKirkland/FTP-Deploy-Action@v4.3.4
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          protocol: ftp
          port: 21
          local-dir: ./server/dist/
          server-dir: ./api.dmifotech.com/
          timeout: 120000
          exclude: |
            **/.git*
            **/.git*/**
            **/node_modules/**
            **/.env