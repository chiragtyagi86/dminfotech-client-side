<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Preconnect + non-render-blocking fonts (cuts FCP/LCP vs CSS @import) -->
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" />

  <!-- Primary SEO (fallback before React/Helmet hydrates).
       NOTE: canonical is set per-page by Seo.jsx (Helmet) — do NOT add a
       static canonical here or it produces duplicate canonical tags. -->
  <title>Dhanamitra Infotech LLP — Web, Digital Marketing & ERP</title>
  <meta name="description" content="Dhanamitra Infotech LLP — ISO 9001:2015 certified website development, digital marketing & ERP software company in Greater Noida West, Delhi NCR. Custom software & business automation for growing brands." />
  <meta name="keywords" content="best website developer, website development company, digital marketing agency, ERP software development, custom software, Greater Noida, Delhi NCR, Dhanamitra Infotech LLP" />
  <meta name="author" content="Dhanamitra Infotech LLP" />
  <meta name="robots" content="index, follow" />
  <meta name="theme-color" content="#1B2A4A" />

  <!-- Open Graph / social fallback -->
  <meta property="og:type" content="website" />
  <meta property="og:site_name" content="Dhanamitra Infotech LLP" />
  <meta property="og:title" content="Dhanamitra Infotech LLP — Website Development, Digital Marketing & ERP Software" />
  <meta property="og:description" content="ISO 9001:2015 certified website development, digital marketing and ERP software company in Greater Noida, Delhi NCR." />
  <meta property="og:url" content="https://dmifotech.com/" />
  <meta property="og:image" content="https://dmifotech.com/logo.svg" />
  <meta name="twitter:card" content="summary_large_image" />
  <meta name="twitter:title" content="Dhanamitra Infotech LLP — Website Development, Digital Marketing & ERP Software" />
  <meta name="twitter:description" content="ISO 9001:2015 certified website development, digital marketing and ERP software company in Greater Noida, Delhi NCR." />
  <meta name="twitter:image" content="https://dmifotech.com/logo.svg" />

  <link rel="icon" type="image/svg+xml" href="/favicon.ico" />
  <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
  <link rel="icon" type="image/png" sizes="16x16" href="/favicon-16x16.png" />
  <link rel="manifest" href="/site.webmanifest" />
</head>
